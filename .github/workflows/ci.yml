name: CI

on:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          #- os: windows-latest
          - os: macos-latest
          #- os: macos-15-intel
          #  arch: x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install meson==1.10.0 ninja

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libgtk-3-dev

      - name: Configure
        run: |
          (cd subprojects && git clone --recursive --filter=blob:none https://github.com/wxWidgets/wxWidgets.git)
          meson setup build

      - name: Build
        run: meson compile -v -C build
